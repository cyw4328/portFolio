<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080808"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a96e;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#c9a96e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c9a96e;stop-opacity:0"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#c9a96e" stroke-width="0.4" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Radial glow top center -->
  <ellipse cx="600" cy="0" rx="500" ry="280" fill="#c9a96e" opacity="0.04"/>

  <!-- Left gold bar -->
  <rect x="80" y="180" width="3" height="270" fill="#c9a96e" opacity="0.7"/>

  <!-- Section label -->
  <text x="104" y="215" font-family="Georgia, serif" font-size="13" fill="#c9a96e" letter-spacing="5" opacity="0.9">DEVELOPER PORTFOLIO</text>

  <!-- Name -->
  <text x="100" y="320" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#eeeeee" letter-spacing="-1">Choi Young Woo</text>

  <!-- Korean name -->
  <text x="104" y="370" font-family="Georgia, serif" font-size="24" fill="#888888" letter-spacing="3">최영우</text>

  <!-- Divider line -->
  <rect x="100" y="400" width="400" height="1" fill="url(#accent-line)"/>

  <!-- Role tags -->
  <rect x="100" y="422" width="130" height="30" rx="0" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="165" y="442" font-family="Arial, sans-serif" font-size="12" fill="#888888" text-anchor="middle" letter-spacing="2">Backend Dev</text>

  <rect x="244" y="422" width="110" height="30" rx="0" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="299" y="442" font-family="Arial, sans-serif" font-size="12" fill="#888888" text-anchor="middle" letter-spacing="2">Full Stack</text>

  <rect x="368" y="422" width="90" height="30" rx="0" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="413" y="442" font-family="Arial, sans-serif" font-size="12" fill="#888888" text-anchor="middle" letter-spacing="2">3Y+ Exp</text>

  <!-- Right CYW logo -->
  <text x="1060" y="350" font-family="Georgia, serif" font-size="140" font-weight="700" fill="#c9a96e" opacity="0.08" text-anchor="middle">CYW</text>
  <text x="1060" y="350" font-family="Georgia, serif" font-size="80" font-weight="700" fill="#c9a96e" opacity="0.5" text-anchor="middle">CYW.</text>

  <!-- Tech stack line -->
  <text x="104" y="510" font-family="Courier New, monospace" font-size="13" fill="#555555" letter-spacing="2">Java · Spring · Vue.js · React Native · .NET · Flutter</text>

  <!-- Bottom border -->
  <rect x="0" y="620" width="1200" height="3" fill="#c9a96e" opacity="0.3"/>
  <rect x="0" y="620" width="200" height="3" fill="#c9a96e" opacity="0.8"/>
</svg>